<!DOCTYPE html>
<html>
<head>
    <title>Offline - Zelquent Tech</title>
    <style>
        body {
            background: #0B0C10;
            color: #C5C6C7;
            text-align: center;
            padding: 2rem;
            font-family: system-ui;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 500px;
        }
        h1 {
            color: #66FCF1;

            color: #0B0C10;

            padding: 0.75rem 2rem;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 1rem;
        }
        button:hover {
            background: #45A29E;
        }

<body>
    <div class="container">
        <h1>You're Offline</h1>

</html>
